  source_weight_map:
    "hnrss.org": 1.2
    "simonwillison.net": 1.45
    "openai.com": 1.5
    "anthropic.com": 1.5
    "deepmind.com": 1.45
    "blog.google": 1.45
    "mistral.ai": 1.4
    "techcrunch.com": 1.0
    "theverge.com": 0.9
    "engineering.fb.com": 1.2
    "machinelearning.apple.com": 1.1
    "aws.amazon.com": 1.1
    "huggingface.co": 1.35
    "microsoft.com": 1.35
    "developer.nvidia.com": 1.25
    "lmarena.ai": 1.3
    "reddit.com": 1.1
    "changelog.com": 1.1
    "arxiv.org": 1.1
    "epochai.org": 1.1
    "semianalysis.com": 1.2
    "mlcommons.org": 1.1
    "bair.berkeley.edu": 1.1
    "openreview.net": 1.0
    "a16z.com": 0.9
    "deeplearning.ai": 1.1
    "oecd.ai": 0.9
    "cset.georgetown.edu": 0.9
    "eur-lex.europa.eu": 0.8
    "jiqizhixin.com": 0.9
